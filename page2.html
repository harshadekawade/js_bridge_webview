<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page 2 — Bridge Test</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Back navigation ── -->
  <button class="back-btn" onclick="history.back()">← Back to Page 1</button>

  <!-- ── Header ── -->
  <div class="header">
    <span class="page-label">PAGE 2</span>
    <h1>🧪 Bridge Re-injection Test</h1>
    <p>Verify the secure bridge reconnects after page navigation</p>
  </div>

  <!-- ── Status bar ── -->
  <div class="status-bar">
    <div class="dot" id="bridgeDot"></div>
    <span id="statusText">Waiting for bridge re-injection…</span>
  </div>

  <!-- ── Auto-ping result ── -->
  <div class="status-bar" id="autoPingBar" style="display:none">
    <span id="autoPingText"></span>
  </div>

  <!-- ── Action buttons ── -->
  <div class="grid">
    <button onclick="doPing()">
      <span class="btn-icon">🏓</span>
      <span class="btn-title">Ping</span>
      <span class="btn-sub">Roundtrip from Page 2</span>
    </button>
    <button onclick="doGetProfile()">
      <span class="btn-icon">👤</span>
      <span class="btn-title">Get User Profile</span>
      <span class="btn-sub">Fetch native user data</span>
    </button>
    <button onclick="doGetDeviceInfo()">
      <span class="btn-icon">📱</span>
      <span class="btn-title">Device Info</span>
      <span class="btn-sub">OS, version, platform</span>
    </button>
    <button onclick="doSavePref()">
      <span class="btn-icon">💾</span>
      <span class="btn-title">Save Preference</span>
      <span class="btn-sub">Write key/value to native</span>
    </button>
  </div>

  <!-- ── Log panel ── -->
  <div class="log-panel">
    <div class="log-header">
      <div class="log-header-left">
        <span>📋 BRIDGE LOG — PAGE 2</span>
        <span id="pendingBadge">0 pending</span>
      </div>
      <button class="log-clear" onclick="clearLogs()">clear</button>
    </div>
    <div id="logList">
      <div class="log-entry info">Page 2 loaded — awaiting bridge injection from native…</div>
    </div>
  </div>

  <script src="page2.js"></script>
</body>
</html>
